# ===============================
# 🚀 Server Configuration
# ===============================
server.port=${PORT:8080}

# ===============================
# 🗄️ Database Configuration - H2 (In-Memory)
# ===============================
spring.datasource.url=jdbc:h2:mem:videocall_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# 🧪 H2 Console
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# 🔄 JPA Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===============================
# 🔐 JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:mysecretkey}
jwt.expiration=86400000

# ===============================
# 🌐 Frontend URL
# ===============================
frontend.base-url=${FRONTEND_URL:http://localhost:3000}

# ===============================
# 🔑 Google OAuth2 Configuration
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ===============================
# 💳 Razorpay Configuration
# ===============================
razorpay.key.id=${RAZORPAY_KEY_ID:dummy}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy}

# ===============================
# 🌍 CORS Configuration
# ===============================
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000}

# ===============================
# 📊 Logging
# ===============================
logging.level.com.videocall=DEBUG
logging.level.org.springframework.security=DEBUG

# ===============================
# 📁 File Upload
# ===============================
app.upload.dir=uploads/avatars
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===============================
# 💼 Plan Limits
# ===============================
plan.free.max.participants=5
plan.free.max.duration.minutes=40
plan.free.recording.enabled=false

plan.pro.max.participants=100
plan.pro.max.duration.minutes=0
plan.pro.recording.enabled=true